commit-msg:
  commands:
    commitlint:
      run: npx commitlint --edit $1

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,js}"
      run: npm run lint
    typecheck:
      run: npm run typecheck
    test:
      run: npm run test
    format:
      glob: "*.{ts,js,json,md}"
      run: npm run format:check
    build-and-stage:
      run: npm run build && git add dist/upkeep-card.js custom_components/upkeep/www/upkeep-card.js custom_components/upkeep/panel/dist/main.js
  skip:
    - merge
    - rebase

pre-push:
  commands:
    build:
      run: npm run build
